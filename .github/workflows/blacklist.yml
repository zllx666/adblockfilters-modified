name: Generate Blacklist
on: 
  workflow_dispatch:
  schedule:
  - cron: 0 1 * * *

env:
  TZ: Asia/Shanghai

  SMARTDNS_PATH: /tmp/smartdns

jobs:
  Generate_Blacklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@main

      - name: Setup Python 3.9.x
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          python -m pip install --upgrade pip
          pip install -U tld IPy dnspython httpx loguru pytricia
      
      - name: Setup SmartDNS
        run: |
          mkdir -p $SMARTDNS_PATH
          LATEST_URL=$(curl -s https://api.github.com/repos/pymumu/smartdns/releases/latest | grep "browser_download_url" | grep "smartdns-x86_64" | cut -d '"' -f 4)
          echo "Downloading SmartDNS from: $LATEST_URL"
          wget -q "$LATEST_URL" -O $SMARTDNS_PATH/smartdns
          chmod +x $SMARTDNS_PATH/smartdns
          cp smartdns.conf $SMARTDNS_PATH/smartdns.conf
          nohup $SMARTDNS_PATH/smartdns -f -x -c $SMARTDNS_PATH/smartdns.conf > /dev/null 2>&1 &

      - name: Wait for SmartDNS
        run: |
          python - <<'PY'
          import time
          import dns.message
          import dns.query
          import dns.rcode

          for i in range(60):
              try:
                  q = dns.message.make_query("example.com", "A")
                  r = dns.query.udp(q, "127.0.0.1", port=5053, timeout=2)
                  print("SmartDNS ready: rcode=%s" % dns.rcode.to_text(r.rcode()))
                  break
              except Exception as e:
                  time.sleep(1)
          else:
              raise SystemExit("SmartDNS not ready")
          PY

      - name: Generate Blacklist
        id: update
        run: |
          python blacklist.py
          rm -rf __pycache__
          echo "message=chore(blacklist): update domain blocklist [$(TZ='Asia/Shanghai' date +'%F %T%:z')]" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ steps.update.outputs.message }}
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 5
