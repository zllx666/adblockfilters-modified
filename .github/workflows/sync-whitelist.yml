name: Sync Upstream Whitelist

on:
  schedule:
    # Run hourly at :30 (e.g., 00:30, 01:30, 02:30, etc.)
    - cron: '30 * * * *'
  push:
    paths:
      - 'rules/white2.txt'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  UPSTREAM_REPO: 217heidai/adblockfilters
  UPSTREAM_BRANCH: main
  TARGET_FILE: rules/white.txt

jobs:
  sync-whitelist:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Sync and Merge Whitelist
        run: |
          # Download upstream whitelist
          curl -fsSL "https://raw.githubusercontent.com/${{ env.UPSTREAM_REPO }}/${{ env.UPSTREAM_BRANCH }}/${{ env.TARGET_FILE }}" -o white_upstream.txt
          
          # Process and merge
          python3 << 'EOF'
          # Read upstream domains
          upstream_domains = set()
          with open('white_upstream.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#') and not line.startswith('!'):
                      upstream_domains.add(line)
          
          # Read custom domains from white2.txt (exclude comments and duplicates)
          custom_domains = set()
          try:
              with open('rules/white2.txt', 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if line and not line.startswith('#') and not line.startswith('!'):
                          # Only add if not already in upstream
                          if line not in upstream_domains:
                              custom_domains.add(line)
          except FileNotFoundError:
              pass
          
          # Write final result: upstream content + custom unique domains
          with open('white_final.txt', 'w', encoding='utf-8') as f:
              # Copy entire upstream file (with comments)
              with open('white_upstream.txt', 'r', encoding='utf-8') as upstream:
                  f.write(upstream.read())
              
              # Append custom unique domains
              if custom_domains:
                  f.write('\n# Custom whitelist entries\n')
                  for domain in sorted(custom_domains):
                      f.write(domain + '\n')
          EOF
          
          # Check if file has changed
          if ! cmp -s white_final.txt "${{ env.TARGET_FILE }}"; then
            echo "Whitelist has been updated"
            mv white_final.txt "${{ env.TARGET_FILE }}"
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "Whitelist is already up to date"
            rm white_final.txt
            echo "CHANGED=false" >> $GITHUB_ENV
          fi
          
          # Cleanup
          rm -f white_upstream.txt
      
      - name: Commit Changes
        if: env.CHANGED == 'true'
        run: |
          git add "${{ env.TARGET_FILE }}"
          git commit -m "chore(whitelist): sync from upstream repository
          
          Synced from ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_BRANCH }}"
          git push
      
      - name: Summary
        run: |
          if [ "${{ env.CHANGED }}" == "true" ]; then
            echo "✅ Whitelist synchronized successfully"
          else
            echo "ℹ️ Whitelist is already up to date"
          fi
